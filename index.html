<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Conteúdo — Gilson</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

:root {
  --bg: #08080d;
  --s1: #101018;
  --s2: #18181f;
  --border: #26262f;
  --ac: #e63900;
  --ac-g: linear-gradient(135deg, #e63900, #00b4b4);
  --so: #f5c800;
  --so-g: linear-gradient(135deg, #003f6b, #00b4d8);
  --gy: #f5c200;
  --gy-g: linear-gradient(135deg, #f5c200, #ffffff);
  --done: #00e676;
  --txt: #f5f5fa;
  --txt2: #9999bb;
  --txt3: #44445a;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }

.hero { position: relative; padding: 28px 24px 0; overflow: hidden; }
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 600px 300px at 80% -20%, rgba(230,57,0,0.15) 0%, transparent 70%),
              radial-gradient(ellipse 400px 200px at -10% 50%, rgba(245,194,0,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-top { display: flex; align-items: center; justify-content: space-between; position: relative; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { width:36px; height:36px; background: var(--ac-g); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.brand-text { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.08em; line-height:1; }
.brand-text span { color: var(--ac); }
.date-pill { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; color:var(--txt3); background:var(--s2); border:1px solid var(--border); padding:6px 12px; border-radius:20px; letter-spacing:0.05em; }

.tabs-wrap { position:sticky; top:0; z-index:50; background:var(--bg); border-bottom:1px solid var(--border); margin-top:20px; }
.tabs { display:flex; overflow-x:auto; scrollbar-width:none; padding:0 24px; gap:4px; }
.tabs::-webkit-scrollbar { display:none; }
.tab { position:relative; padding:14px 18px 12px; font-size:13px; font-weight:700; letter-spacing:0.04em; color:var(--txt3); cursor:pointer; white-space:nowrap; background:none; border:none; font-family:'Inter',sans-serif; transition:color 0.2s; }
.tab::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; border-radius:2px 2px 0 0; opacity:0; transition:opacity 0.2s; }
.tab:hover { color: var(--txt2); }
.tab[data-p="academia"].on { color: #e63900; }
.tab[data-p="academia"].on::after { background: linear-gradient(90deg,#e63900,#00b4b4); opacity:1; }
.tab[data-p="sorveteria"].on { color: #f5c800; }
.tab[data-p="sorveteria"].on::after { background: linear-gradient(90deg,#003f6b,#00b4d8,#f5c800); opacity:1; }
.tab[data-p="gympulse"].on { color: #f5c200; }
.tab[data-p="gympulse"].on::after { background: linear-gradient(90deg,#f5c200,#ffffff); opacity:1; }
.tab[data-p="historico"].on { color: var(--txt); }
.tab[data-p="historico"].on::after { background: linear-gradient(90deg,#e63900,#f5c800,#f5c200); opacity:1; }

main { max-width:780px; margin:0 auto; padding:28px 20px 100px; }
.panel { display:none; }
.panel.on { display:block; }

.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:28px; }
.stat { background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:14px 12px; text-align:center; }
.stat-n { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; letter-spacing:0.04em; }
.stat-l { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--txt3); margin-top:4px; }

.dgroup { margin-bottom:36px; }
.dlabel { font-size:10px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--txt3); margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.dlabel::after { content:''; flex:1; height:1px; background:var(--border); }

.card { background:var(--s1); border:1px solid var(--border); border-radius:14px; margin-bottom:10px; overflow:hidden; transition:border-color 0.2s, transform 0.15s; }
.card:hover { transform:translateY(-1px); }
.card[data-p="academia"] { border-left:3px solid #e63900; }
.card[data-p="sorveteria"] { border-left:3px solid #f5c800; }
.card[data-p="gympulse"] { border-left:3px solid #f5c200; }
.card.done { opacity:0.45; filter:saturate(0.3); }

.chead { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; user-select:none; transition:background 0.15s; }
.chead:hover { background:var(--s2); }
.chk { width:24px; height:24px; border-radius:7px; border:2px solid var(--border); background:transparent; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:white; transition:all 0.15s; font-family:'Inter',sans-serif; }
.chk:hover { border-color:var(--done); }
.card.done .chk { background:var(--done); border-color:var(--done); }
.cmeta { flex:1; display:flex; align-items:center; gap:8px; min-width:0; }
.ctag { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; padding:4px 9px; border-radius:5px; flex-shrink:0; }
.card[data-p="academia"] .ctag { background:rgba(230,57,0,0.15); color:#e63900; }
.card[data-p="sorveteria"] .ctag { background:rgba(245,200,0,0.15); color:#f5c800; }
.card[data-p="gympulse"] .ctag { background:rgba(245,194,0,0.15); color:#f5c200; }
.cfmt { font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--txt3); background:var(--s2); padding:4px 8px; border-radius:4px; flex-shrink:0; }
.ctitle { font-size:13px; font-weight:600; color:var(--txt); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.cchev { font-size:10px; color:var(--txt3); flex-shrink:0; transition:transform 0.2s; }
.card.open .cchev { transform:rotate(180deg); }

.cbody { display:none; padding:0 16px 18px; border-top:1px solid var(--border); }
.card.open .cbody { display:block; }
.block { margin-top:16px; }
.blabel { font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }

.drive-ref { display:flex; align-items:center; gap:10px; background:rgba(0,180,216,0.06); border:1px solid rgba(0,180,216,0.15); border-radius:8px; padding:10px 12px; }
.drive-icon { font-size:16px; flex-shrink:0; }
.drive-info { flex:1; min-width:0; }
.drive-name { font-size:12px; font-weight:600; color:#00b4d8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.drive-hint { font-size:11px; color:var(--txt3); margin-top:2px; }
.drive-link { font-size:10px; font-weight:700; letter-spacing:0.06em; color:#00b4d8; text-decoration:none; background:rgba(0,180,216,0.1); padding:4px 8px; border-radius:4px; white-space:nowrap; flex-shrink:0; }
.drive-link:hover { background:rgba(0,180,216,0.2); }

.tbox { background:var(--s2); border:1px solid var(--border); border-radius:9px; padding:13px 14px; font-size:13px; line-height:1.75; color:var(--txt); white-space:pre-wrap; }

.pbox { background:#0a0d0a; border:1px solid #1e2e1e; border-radius:9px; padding:13px 14px; font-family:'JetBrains Mono',monospace; font-size:11.5px; line-height:1.7; color:#4ade80; white-space:pre-wrap; }
.pbox-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.pbox-badge { font-size:9px; font-weight:800; letter-spacing:0.1em; background:rgba(74,222,128,0.12); color:#4ade80; border:1px solid rgba(74,222,128,0.2); padding:3px 8px; border-radius:4px; }

.palette-bar { display:flex; gap:6px; margin-bottom:10px; align-items:center; }
.palette-chip { width:20px; height:20px; border-radius:4px; border:1px solid rgba(255,255,255,0.1); flex-shrink:0; }
.palette-label { font-size:10px; font-family:'JetBrains Mono',monospace; color:var(--txt3); }

.canva-steps { background:var(--s2); border:1px solid var(--border); border-radius:9px; overflow:hidden; }
.canva-step { display:flex; align-items:flex-start; gap:12px; padding:11px 14px; border-bottom:1px solid var(--border); }
.canva-step:last-child { border:none; }
.step-num { width:20px; height:20px; border-radius:50%; background:rgba(167,139,250,0.15); color:#a78bfa; font-size:10px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.step-txt { font-size:12.5px; color:var(--txt2); line-height:1.5; flex:1; }
.step-tag { font-size:10px; font-weight:700; padding:2px 6px; border-radius:3px; margin-right:4px; flex-shrink:0; }
.tag-drive { background:rgba(0,180,216,0.1); color:#00b4d8; }
.tag-chatgpt { background:rgba(74,222,128,0.1); color:#4ade80; }
.tag-canva { background:rgba(167,139,250,0.1); color:#a78bfa; }

.copybtn { margin-top:7px; display:block; margin-left:auto; font-size:10px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--txt3); background:var(--s2); border:1px solid var(--border); border-radius:5px; padding:5px 10px; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.15s; }
.copybtn:hover { color:var(--txt); border-color:var(--txt3); }

.hentry { display:flex; align-items:center; gap:12px; background:var(--s1); border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-bottom:8px; }
.hdot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.hinfo { flex:1; min-width:0; }
.htitle { font-size:13px; font-weight:600; }
.hsub { font-size:11px; color:var(--txt3); margin-top:2px; }
.hbadge { font-size:9px; font-weight:800; letter-spacing:0.1em; padding:4px 9px; border-radius:4px; flex-shrink:0; }
.hbadge.done { background:rgba(0,230,118,0.12); color:var(--done); }
.hbadge.pend { background:var(--s2); color:var(--txt3); }

.empty { text-align:center; padding:70px 20px; color:var(--txt3); }
.empty .eico { font-size:40px; margin-bottom:14px; }
.empty p { font-size:14px; line-height:1.7; }

@media(max-width:600px) {
  .stats { grid-template-columns:repeat(2,1fr); }
  main { padding:20px 14px 80px; }
}
</style>
</head>

const SK='gilson_v4';
let S=JSON.parse(localStorage.getItem(SK)||'{}');
const save=()=>localStorage.setItem(SK,JSON.stringify(S));
const done=id=>!!S[id];
const toggle=id=>{S[id]=!S[id];save();renderAll();buildHist();};

function fmtDate(ds){
  const [y,m,d]=ds.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  const dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const mn=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${dn[dt.getDay()]}, ${d} de ${mn[m-1]} de ${y}`;
}

function groupBy(arr,key){return arr.reduce((g,x)=>{(g[x[key]]=g[x[key]]||[]).push(x);return g;},{});}

function tagHTML(tag){
  const map={drive:'DRIVE',chatgpt:'CHATGPT',canva:'CANVA'};
  const cls={drive:'tag-drive',chatgpt:'tag-chatgpt',canva:'tag-canva'};
  return `<span class="step-tag ${cls[tag]}">${map[tag]}</span>`;
}

function paletteHTML(profile){
  return PALETTES[profile].map(c=>
    `<div class="palette-chip" style="background:${c.hex}" title="${c.label} ${c.hex}"></div>
     <span class="palette-label">${c.hex}</span>`
  ).join('');
}

function cardHTML(item,profile){
  const d=done(item.id);
  const steps=item.canva.map((s,i)=>`
    <div class="canva-step">
      <div class="step-num">${i+1}</div>
      <div class="step-txt">${tagHTML(s.tag)}${s.txt}</div>
    </div>`).join('');
  return `
<div class="card ${d?'done':''}" data-p="${profile}" id="card-${item.id}">
  <div class="chead" onclick="expand('${item.id}')">
    <button class="chk" onclick="event.stopPropagation();toggle('${item.id}')">${d?'✓':''}</button>
    <div class="cmeta">
      <span class="ctag">${item.time}</span>
      <span class="cfmt">${item.format}</span>
      <span class="ctitle">${item.title}</span>
    </div>
    <span class="cchev">▼</span>
  </div>
  <div class="cbody">
    <div class="block">
      <div class="blabel" style="color:#00b4d8">📁 Foto real — Google Drive</div>
      <div class="drive-ref">
        <span class="drive-icon">🖼️</span>
        <div class="drive-info">
          <div class="drive-name">${item.driveFile}</div>
          <div class="drive-hint">${item.driveHint}</div>
        </div>
        <a class="drive-link" href="${item.driveUrl}" target="_blank">Abrir ↗</a>
      </div>
    </div>
    <div class="block">
      <div class="blabel" style="color:#f5a623">📝 Texto pronto para copiar</div>
      <div class="tbox" id="t-${item.id}">${item.text}</div>
      <button class="copybtn" onclick="cp('t-${item.id}',this)">Copiar texto</button>
    </div>
    <div class="block">
      <div class="pbox-header">
        <div class="blabel" style="color:#4ade80;margin:0">🤖 Prompt para ChatGPT / DALL-E 3</div>
        <span class="pbox-badge">DALL-E 3</span>
      </div>
      <div class="palette-bar">${paletteHTML(profile)}</div>
      <div class="pbox" id="p-${item.id}">${item.prompt}</div>
      <button class="copybtn" onclick="cp('p-${item.id}',this)">Copiar prompt</button>
    </div>
    <div class="block">
      <div class="blabel" style="color:#a78bfa">🖼️ Passo a passo no Canva</div>
      <div class="canva-steps">${steps}</div>
    </div>
  </div>
</div>`;
}

function renderPanel(profile){
  const items=CONTENT[profile];
  const el=document.getElementById('p-'+profile);
  const total=items.length;
  const doneN=items.filter(i=>done(i.id)).length;
  const pct=total>0?Math.round(doneN/total*100):0;
  const colors={academia:'#e63900',sorveteria:'#f5c800',gympulse:'#f5c200'};
  const c=colors[profile];
  const groups=groupBy(items,'date');
  let html='';
  Object.keys(groups).sort().reverse().forEach(date=>{
    html+=`<div class="dgroup"><div class="dlabel">${fmtDate(date)}</div>`;
    groups[date].forEach(item=>{html+=cardHTML(item,profile);});
    html+='</div>';
  });
  el.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-n">${total}</div><div class="stat-l">Total</div></div>
      <div class="stat"><div class="stat-n" style="color:${c}">${doneN}</div><div class="stat-l">Feito</div></div>
      <div class="stat"><div class="stat-n">${total-doneN}</div><div class="stat-l">Pendente</div></div>
      <div class="stat"><div class="stat-n" style="color:${c}">${pct}%</div><div class="stat-l">Progresso</div></div>
    </div>${html||'<div class="empty"><div class="eico">📭</div><p>Sem conteúdo ainda.</p></div>'}`;
}

function renderAll(){['academia','sorveteria','gympulse'].forEach(renderPanel);}

function buildHist(){
  const all=[
    ...CONTENT.academia.map(i=>({...i,profile:'academia',color:'#e63900',label:'Academia'})),
    ...CONTENT.sorveteria.map(i=>({...i,profile:'sorveteria',color:'#f5c800',label:'Sorveteria'})),
    ...CONTENT.gympulse.map(i=>({...i,profile:'gympulse',color:'#f5c200',label:'GympulsePro'}))
  ].sort((a,b)=>b.date.localeCompare(a.date)||a.time.localeCompare(b.time));
  document.getElementById('p-historico').innerHTML=all.map(item=>`
    <div class="hentry">
      <div class="hdot" style="background:${item.color}"></div>
      <div class="hinfo">
        <div class="htitle">${item.title}</div>
        <div class="hsub">${item.label} · ${item.time} · ${item.format} · ${fmtDate(item.date)}</div>
      </div>
      <div class="hbadge ${done(item.id)?'done':'pend'}">${done(item.id)?'FEITO':'PENDENTE'}</div>
    </div>`).join('');
}

function expand(id){document.getElementById('card-'+id).classList.toggle('open');}

function cp(id,btn){
  const el=document.getElementById(id);
  if(!el)return;
  navigator.clipboard.writeText(el.textContent).then(()=>{
    const o=btn.textContent;
    btn.textContent='✓ Copiado!';
    setTimeout(()=>btn.textContent=o,1500);
  });
}

function go(tab,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+tab).classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  if(tab==='historico')buildHist();
}

(function(){
  const n=new Date();
  const dn=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const mn=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  document.getElementById('datepill').textContent=`${dn[n.getDay()]} ${n.getDate()} ${mn[n.getMonth()]}`;
})();

renderAll();
</script>
