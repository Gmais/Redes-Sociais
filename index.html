<script>(async function loadInitialData() {try {const resp = await fetch("data.json"); if (!resp.ok) return; const data = await resp.json(); let manifestLocal = {}; try {const stored = localStorage.getItem("gilson_manifest"); if (stored) manifestLocal = JSON.parse(stored);} catch (e) {} const merged = { ...manifestLocal, ...data }; localStorage.setItem("gilson_manifest", JSON.stringify(merged)); window.dispatchEvent(new CustomEvent("dataLoaded", { detail: merged })); console.log(`✓ ${Object.keys(data).length} posts sincronizados`);} catch (e) {}})()</script>
</body>
