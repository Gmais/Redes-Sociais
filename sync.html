<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sincronizar Posts</title>
<style>
body { font-family: Inter, sans-serif; background: #08080d; color: #f5f5fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
.container { text-align: center; }
button { background: #00b4b4; color: #fff; border: 0; padding: 16px 32px; font-size: 18px; cursor: pointer; border-radius: 8px; }
button:hover { background: #00a0a0; }
#status { margin-top: 20px; font-size: 14px; color: #9999bb; }
</style>
</head>
<body>
<div class="container">
  <h2>Sincronizar Posts Dias 3-4</h2>
  <button onclick="sync()">Sincronizar 19 Posts</button>
  <div id="status">Aguardando...</div>
</div>
<script>
async function sync() {
  const btn = document.querySelector('button');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '🔄 Sincronizando...';
  
  try {
    const data = {
      ac62: {id:"ac62",dia:"3",horario:"08:00",marca:"Academia",formato:"Post",status:"pending"},
      ac63: {id:"ac63",dia:"3",horario:"12:00",marca:"Academia",formato:"Carrossel",status:"pending"},
      ac64: {id:"ac64",dia:"3",horario:"17:00",marca:"Academia",formato:"Post",status:"pending"},
      ac65: {id:"ac65",dia:"3",horario:"20:00",marca:"Academia",formato:"Post",status:"pending"},
      so82: {id:"so82",dia:"3",horario:"09:00",marca:"Sorveteria",formato:"Post",status:"pending"},
      so83: {id:"so83",dia:"3",horario:"11:30",marca:"Sorveteria",formato:"Carrossel",status:"pending"},
      so84: {id:"so84",dia:"3",horario:"15:00",marca:"Sorveteria",formato:"Post",status:"pending"},
      so85: {id:"so85",dia:"3",horario:"19:00",marca:"Sorveteria",formato:"Post",status:"pending"},
      gy35: {id:"gy35",dia:"3",horario:"10:00",marca:"GympulsePro",formato:"Post",status:"pending"},
      gy36: {id:"gy36",dia:"3",horario:"18:00",marca:"GympulsePro",formato:"Post",status:"pending"},
      ac66: {id:"ac66",dia:"4",horario:"08:00",marca:"Academia",formato:"Post",status:"pending"},
      ac67: {id:"ac67",dia:"4",horario:"20:00",marca:"Academia",formato:"Post",status:"pending"},
      so86: {id:"so86",dia:"4",horario:"09:00",marca:"Sorveteria",formato:"Carrossel",status:"pending"},
      so87: {id:"so87",dia:"4",horario:"11:30",marca:"Sorveteria",formato:"Post",status:"pending"},
      so88: {id:"so88",dia:"4",horario:"15:00",marca:"Sorveteria",formato:"Post",status:"pending"},
      so89: {id:"so89",dia:"4",horario:"17:00",marca:"Sorveteria",formato:"Post",status:"pending"},
      so90: {id:"so90",dia:"4",horario:"19:00",marca:"Sorveteria",formato:"Carrossel",status:"pending"},
      gy37: {id:"gy37",dia:"4",horario:"10:00",marca:"GympulsePro",formato:"Post",status:"pending"},
      gy38: {id:"gy38",dia:"4",horario:"18:00",marca:"GympulsePro",formato:"Post",status:"pending"}
    };
    
    const resp = await fetch('/api/sync-posts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    
    if (resp.ok) {
      status.textContent = '✅ 19 posts sincronizados! Recarregue o painel.';
    } else {
      status.textContent = '❌ Erro: ' + await resp.text();
    }
  } catch (e) {
    status.textContent = '❌ ' + e.message;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
